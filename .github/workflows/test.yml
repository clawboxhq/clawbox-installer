name: Test Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck lib/*.sh scripts/*.sh install.sh uninstall.sh || true

  test-dry-run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x install.sh uninstall.sh scripts/*.sh

      - name: Test dry run
        run: ./install.sh --dry-run

  test-scripts:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Test architecture check
        run: ./scripts/01-check-architecture.sh || true

      - name: Test prerequisites check
        run: ./scripts/02-check-prerequisites.sh || true
