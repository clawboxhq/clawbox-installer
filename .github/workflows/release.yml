name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          mkdir -p dist
          
          # Build for all platforms
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.Version=$VERSION -X main.GitCommit=$GIT_COMMIT -X main.BuildDate=$BUILD_DATE" -o dist/clawbox-$VERSION-darwin-arm64 ./cmd/clawbox
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION -X main.GitCommit=$GIT_COMMIT -X main.BuildDate=$BUILD_DATE" -o dist/clawbox-$VERSION-darwin-amd64 ./cmd/clawbox
          GOOS=linux GOARCH=arm64 go build -ldflags "-X main.Version=$VERSION -X main.GitCommit=$GIT_COMMIT -X main.BuildDate=$BUILD_DATE" -o dist/clawbox-$VERSION-linux-arm64 ./cmd/clawbox
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION -X main.GitCommit=$GIT_COMMIT -X main.BuildDate=$BUILD_DATE" -o dist/clawbox-$VERSION-linux-amd64 ./cmd/clawbox
          
          # Create checksums
          cd dist && sha256sum * > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawbox-${{ steps.version.outputs.VERSION }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: clawbox-${{ steps.version.outputs.VERSION }}
          path: .

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: List files
        run: ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ClawBox v${{ steps.version.outputs.VERSION }}
          body: |
            ## ClawBox v${{ steps.version.outputs.VERSION }}
            
            ### Downloads
            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS | Apple Silicon (M1/M2/M3/M4) | `clawbox-${{ steps.version.outputs.VERSION }}-darwin-arm64` |
            | macOS | Intel | `clawbox-${{ steps.version.outputs.VERSION }}-darwin-amd64` |
            | Linux | ARM64 | `clawbox-${{ steps.version.outputs.VERSION }}-linux-arm64` |
            | Linux | x86_64 | `clawbox-${{ steps.version.outputs.VERSION }}-linux-amd64` |
            
            ### Installation
            ```bash
            # Download and install
            curl -fsSL https://github.com/clawboxhq/clawbox-installer/releases/download/v${{ steps.version.outputs.VERSION }}/clawbox-${{ steps.version.outputs.VERSION }}-darwin-arm64 -o clawbox
            chmod +x clawbox
            sudo mv clawbox /usr/local/bin/
            ```
            
            ### What's Changed
            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: |
            clawbox-*-darwin-*
            clawbox-*-linux-*
            checksums.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test -v ./...

      - name: Run linters
        run: |
          go fmt ./...
          go vet ./...
