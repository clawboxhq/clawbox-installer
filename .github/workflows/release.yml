name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          mkdir -p dist

          # Build for all platforms
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.Version=$VERSION -X main.GitCommit=$GIT_COMMIT -X main.BuildDate=$BUILD_DATE" -o dist/clawbox-$VERSION-darwin-arm64 ./cmd/clawbox
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION -X main.GitCommit=$GIT_COMMIT -X main.BuildDate=$BUILD_DATE" -o dist/clawbox-$VERSION-darwin-amd64 ./cmd/clawbox
          GOOS=linux GOARCH=arm64 go build -ldflags "-X main.Version=$VERSION -X main.GitCommit=$GIT_COMMIT -X main.BuildDate=$BUILD_DATE" -o dist/clawbox-$VERSION-linux-arm64 ./cmd/clawbox
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION -X main.GitCommit=$GIT_COMMIT -X main.BuildDate=$BUILD_DATE" -o dist/clawbox-$VERSION-linux-amd64 ./cmd/clawbox
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION -X main.GitCommit=$GIT_COMMIT -X main.BuildDate=$BUILD_DATE" -o dist/clawbox-$VERSION-windows-amd64.exe ./cmd/clawbox
          GOOS=windows GOARCH=arm64 go build -ldflags "-X main.Version=$VERSION -X main.GitCommit=$GIT_COMMIT -X main.BuildDate=$BUILD_DATE" -o dist/clawbox-$VERSION-windows-arm64.exe ./cmd/clawbox

          # Copy install scripts to dist
          cp packaging/install.sh dist/install.sh
          cp packaging/install.ps1 dist/install.ps1

          # Create checksums
          cd dist && sha256sum * > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*

    release:
      needs: build
      runs-on: ubuntu-latest
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: List files
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          VERSION: ${{ needs.build.outputs.version }}
        with:
          name: ClawBox v${{ needs.build.outputs.version }}
          body_path: .github/release-template.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test -v ./...

      - name: Run linters
        run: |
          go fmt ./...
          go vet ./...
