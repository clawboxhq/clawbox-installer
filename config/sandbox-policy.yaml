# Sandbox Security Policy for NemoClaw
# This policy is applied to the OpenClaw sandbox to restrict network and filesystem access

version: "1.0"

# Filesystem policy - locked at sandbox creation
filesystem:
  # Allow read/write access to these paths
  read_write:
    - /sandbox
    - /tmp
    - /sandbox/.openclaw
    - /sandbox/workspace
  
  # Read-only access to system directories
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /opt/nemoclaw
  
  # Landlock compatibility
  landlock:
    compatibility: best_effort

# Network policy - hot-reloadable
network:
  # Default: deny all outbound
  default_action: deny
  
  # Allowed endpoints for NVIDIA Cloud inference
  endpoints:
    - name: nvidia-api
      host: integrate.api.nvidia.com
      port: 443
      protocol: https
      methods:
        - GET
        - POST
      enforcement: enforce
    
    - name: nvidia-build
      host: build.nvidia.com
      port: 443
      protocol: https
      methods:
        - GET
        - POST
      enforcement: enforce
    
    # OpenShell gateway (local)
    - name: gateway-local
      host: host.openshell.internal
      port: 8080
      protocol: http
      methods:
        - GET
        - POST
        - PUT
        - DELETE
      enforcement: enforce

# Process policy - locked at sandbox creation
process:
  # Run as unprivileged user
  run_as_user: sandbox
  run_as_group: sandbox
  
  # Blocked syscalls (seccomp)
  blocked_syscalls:
    - kexec_load
    - kexec_file_load
    - init_module
    - finit_module
    - acct
    - swapon
    - swapoff
    - reboot
    - clock_settime
    - settimeofday
    - stime

# Inference routing policy
inference:
  # Route model requests through OpenShell gateway
  route_through_gateway: true
  
  # Strip caller credentials
  strip_credentials: true
  
  # Provider configuration
  providers:
    - id: nvidia-inference
      type: openai
      endpoint: https://integrate.api.nvidia.com/v1
      credential_source: openshell-managed
